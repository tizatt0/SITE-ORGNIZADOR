<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem para a Copa do Mundo 2030</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay"></div>

    <main class="container">

        <h1>🏆 Copa do Mundo 2030</h1>

        <p class="subtitle">
            BRASIL

        </p>

        <div class="countdown">

            <div class="card">
                <span id="days">0000</span>
                <p>Dias</p>
            </div>

            <div class="card">
                <span id="hours">00</span>
                <p>Horas</p>
            </div>

            <div class="card">
                <span id="minutes">00</span>
                <p>Minutos</p>
            </div>

            <div class="card">
                <span id="seconds">00</span>
                <p>Segundos</p>
            </div>

        </div>

        <h2 id="message"></h2>

    </main>

    <script src="main.js"></script>

</body>

</html>
